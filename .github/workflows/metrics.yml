# Generates GitHub profile metrics as SVG images and commits them to this repo.
# Runs every 12 hours, on every push to main, and can be triggered manually.
# Requires METRICS_TOKEN secret (GitHub PAT with repo + read:user scopes).
# commits_authoring covers local git identity "UG" so private commits are counted.

name: Metrics

on:
  schedule:
    - cron: "0 */12 * * *"   # Every 12 hours
  workflow_dispatch:           # Manual trigger from Actions tab
  push:
    branches: [main]

jobs:
  metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:

      # ── 1. Main profile header + activity + lines ──────────────────
      - name: Main stats
        uses: lowlighter/metrics@latest
        with:
          filename: metrics.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: umg-gpt
          base: header, activity, community, repositories, metadata
          config_timezone: Asia/Kolkata
          commits_authoring: UG, ug@UGs-MacBook-Pro.local, umg-gpt
          plugin_lines: yes
          plugin_lines_history_limit: 1
          plugin_lines_repositories_limit: 4
          plugin_lines_sections: base

      # ── 2. Contribution calendar — half year ───────────────────────
      - name: Contribution calendar
        uses: lowlighter/metrics@latest
        with:
          filename: metrics.calendar.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: umg-gpt
          base: ""
          config_timezone: Asia/Kolkata
          commits_authoring: UG, ug@UGs-MacBook-Pro.local, umg-gpt
          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year

      # ── 3. Languages breakdown ─────────────────────────────────────
      - name: Languages
        uses: lowlighter/metrics@latest
        with:
          filename: metrics.languages.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: umg-gpt
          base: ""
          config_timezone: Asia/Kolkata
          commits_authoring: UG, ug@UGs-MacBook-Pro.local, umg-gpt
          plugin_languages: yes
          plugin_languages_ignored: html, css, less, dockerfile, makefile, shell
          plugin_languages_sections: most-used, recently-used
          plugin_languages_details: percentage, bytes-size, lines
          plugin_languages_limit: 8
          plugin_languages_recent_load: 500
          plugin_languages_recent_days: 30
          plugin_languages_indepth: yes
          plugin_languages_analysis_timeout: 30

      # ── 4. Coding habits ───────────────────────────────────────────
      - name: Coding habits
        uses: lowlighter/metrics@latest
        with:
          filename: metrics.habits.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: umg-gpt
          base: ""
          config_timezone: Asia/Kolkata
          commits_authoring: UG, ug@UGs-MacBook-Pro.local, umg-gpt
          plugin_habits: yes
          plugin_habits_facts: yes
          plugin_habits_charts: yes
          plugin_habits_charts_type: classic
          plugin_habits_from: 500
          plugin_habits_days: 30
          plugin_habits_trim: yes

      # ── 5. Recent activity feed ────────────────────────────────────
      - name: Recent activity
        uses: lowlighter/metrics@latest
        with:
          filename: metrics.activity.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: umg-gpt
          base: ""
          config_timezone: Asia/Kolkata
          plugin_activity: yes
          plugin_activity_limit: 5
          plugin_activity_days: 14
          plugin_activity_filter: commit, push, issue, pr, release
          plugin_activity_visibility: all
