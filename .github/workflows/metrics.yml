# Generates GitHub profile metrics as SVG images and commits them to this repo.
# Runs daily at midnight, on every push to main, and can be triggered manually.
# Requires a METRICS_TOKEN secret (GitHub PAT with repo + read:user scopes).

name: Metrics

on:
  schedule:
    - cron: "0 0 * * *"   # Every day at midnight UTC
  workflow_dispatch:        # Manual trigger from Actions tab
  push:
    branches: [main]

jobs:
  metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:

      # ── Main stats + languages ─────────────────────────────────────
      - name: General stats and languages
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics.svg
          user: umg-gpt
          template: classic
          base: header, activity, community, repositories
          base_indepth: yes
          plugin_languages: yes
          plugin_languages_analysis_timeout: 30
          plugin_languages_categories: markup, programming
          plugin_languages_colors: github
          plugin_languages_limit: 6
          plugin_languages_sections: most-used
          plugin_languages_threshold: 0%
          plugin_languages_indepth: yes
          config_timezone: Asia/Kolkata

      # ── Contribution calendar (full year heatmap) ──────────────────
      - name: Contribution calendar
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics.calendar.svg
          user: umg-gpt
          base: ""
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
          config_timezone: Asia/Kolkata
