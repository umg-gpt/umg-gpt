# Generates GitHub profile metric SVGs and commits them to this repo.
# Fix: output_action: pull-push on every step prevents SHA mismatch failures.
# commits_authoring covers all identities found across repos.

name: Metrics

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:
  push:
    branches: ["main"]

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:

      # ===== 1. PROFILE OVERVIEW =====
      - name: Profile Overview
        uses: lowlighter/metrics@latest
        with:
          filename: metrics.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: umg-gpt
          base: header, activity, community, repositories, metadata
          config_timezone: Asia/Kolkata
          commits_authoring: UG, Umang Gupta, Umg Gpt, umg-gpt, OpenClaw Agent, umang13, umang8, ug@UGs-MacBook-Pro.local, umg.gpt@gmail.com, umang@moltpe.com
          output_action: pull-push
          plugin_lines: yes
          plugin_lines_history_limit: 1
          plugin_lines_repositories_limit: 4
          plugin_lines_sections: base

      # ===== 2. ISOMETRIC CALENDAR (half-year) =====
      - name: Isometric Calendar
        uses: lowlighter/metrics@latest
        with:
          filename: metrics.calendar.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: umg-gpt
          base: ""
          config_timezone: Asia/Kolkata
          commits_authoring: UG, Umang Gupta, Umg Gpt, umg-gpt, OpenClaw Agent, umang13, umang8, ug@UGs-MacBook-Pro.local, umg.gpt@gmail.com, umang@moltpe.com
          output_action: pull-push
          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year

      # ===== 3. LANGUAGES =====
      - name: Languages
        uses: lowlighter/metrics@latest
        with:
          filename: metrics.languages.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: umg-gpt
          base: ""
          config_timezone: Asia/Kolkata
          commits_authoring: UG, Umang Gupta, Umg Gpt, umg-gpt, OpenClaw Agent, umang13, umang8, ug@UGs-MacBook-Pro.local, umg.gpt@gmail.com, umang@moltpe.com
          output_action: pull-push
          plugin_languages: yes
          plugin_languages_ignored: html, css, less, dockerfile, makefile, shell, nix, procfile
          plugin_languages_sections: most-used
          plugin_languages_details: percentage, bytes-size
          plugin_languages_limit: 8
          plugin_languages_indepth: yes
          plugin_languages_analysis_timeout: 45

      # ===== 4. CODING HABITS =====
      - name: Coding Habits
        uses: lowlighter/metrics@latest
        with:
          filename: metrics.habits.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: umg-gpt
          base: ""
          config_timezone: Asia/Kolkata
          commits_authoring: UG, Umang Gupta, Umg Gpt, umg-gpt, OpenClaw Agent, umang13, umang8, ug@UGs-MacBook-Pro.local, umg.gpt@gmail.com, umang@moltpe.com
          output_action: pull-push
          plugin_habits: yes
          plugin_habits_facts: yes
          plugin_habits_charts: yes
          plugin_habits_charts_type: classic
          plugin_habits_from: 200
          plugin_habits_days: 30
          plugin_habits_trim: yes

      # ===== 5. RECENT ACTIVITY =====
      - name: Recent Activity
        uses: lowlighter/metrics@latest
        with:
          filename: metrics.activity.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: umg-gpt
          base: ""
          config_timezone: Asia/Kolkata
          output_action: pull-push
          plugin_activity: yes
          plugin_activity_limit: 5
          plugin_activity_days: 30
          plugin_activity_filter: commit, push, pr, release
          plugin_activity_visibility: all
